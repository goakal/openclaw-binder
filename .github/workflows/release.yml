name: Release

on:
  push:
    branches:
      - main

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          registry-url: "https://registry.npmjs.org"

      - name: Read version from package.json
        id: version
        run: |
          version=$(jq -r '.version' package.json)
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "tag=v$version" >> "$GITHUB_OUTPUT"

      - name: Check if release already exists
        id: check
        run: |
          tag="${{ steps.version.outputs.tag }}"
          if gh release view "$tag" >>/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "Release $tag already exists. Skipping."
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Install dependencies
        if: steps.check.outputs.exists == 'false'
        run: npm install

      - name: Build
        if: steps.check.outputs.exists == 'false'
        run: npm run build

      - name: Update version in openclaw.plugin.json
        if: steps.check.outputs.exists == 'false'
        run: |
          version="${{ steps.version.outputs.version }}"
          jq ".version = \"$version\"" openclaw.plugin.json > tmp.json && mv tmp.json openclaw.plugin.json

      - name: Create archive
        if: steps.check.outputs.exists == 'false'
        run: |
          tar czf binder-${{ steps.version.outputs.version }}.tgz \
            package.json \
            openclaw.plugin.json \
            tsconfig.json \
            dist/ \
            skills/

      - name: Create GitHub release
        if: steps.check.outputs.exists == 'false'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: ${{ steps.version.outputs.version }}
          files: binder-${{ steps.version.outputs.version }}.tgz
          generate_release_notes: true
