name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Update version in files
        run: |
          jq '.version = "${{ steps.version.outputs.version }}"' package.json > tmp.json && mv tmp.json package.json
          jq '.version = "${{ steps.version.outputs.version }}"' openclaw.plugin.json > tmp.json && mv tmp.json openclaw.plugin.json

      - name: Create archive (stable, minimal)
        run: |
          tar czf binder-${{ steps.version.outputs.version }}.tgz \
            package.json \
            openclaw.plugin.json \
            index.ts \
            src/

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: binder-${{ steps.version.outputs.version }}.tgz
          generate_release_notes: true